<!DOCTYPE html>
<html>
<head>
  <title>Auth2U Admin Panel</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    input, button {
      padding: 10px;
      margin: 5px;
    }

    button {
      cursor: pointer;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      margin-top: 10px;
      border-radius: 10px;
    }

    table {
      width: 100%;
      margin-top: 10px;
      border-collapse: collapse;
    }

    th, td {
      border: 1px solid #334155;
      padding: 8px;
      text-align: left;
    }
  </style>
</head>
<body>

<h1>Auth2U Admin Panel</h1>

<h3>API Key</h3>
<input id="apiKey" placeholder="Enter superadmin API key" style="width:400px;" />

<br>

<button onclick="loadUsers()">Load Users</button>
<button onclick="loadStats()">Load Stats</button>

<div class="card">
  <h3>Create User</h3>
  <input id="email" placeholder="email" />
  <input id="plan" placeholder="plan (free/sme/business)" />
  <button onclick="createUser()">Create</button>
</div>

<div id="output"></div>

<script>
const baseURL = "https://auth2u.people-luviio.workers.dev";

function getKey() {
  return document.getElementById("apiKey").value;
}

async function loadUsers() {
  const res = await fetch(baseURL + "/admin/keys", {
    headers: {
      "Authorization": "Bearer " + getKey()
    }
  });

  const data = await res.json();
  document.getElementById("output").innerHTML =
    "<pre>" + JSON.stringify(data, null, 2) + "</pre>";
}

async function loadStats() {
  const res = await fetch(baseURL + "/admin/stats", {
    headers: {
      "Authorization": "Bearer " + getKey()
    }
  });

  const data = await res.json();
  document.getElementById("output").innerHTML =
    "<pre>" + JSON.stringify(data, null, 2) + "</pre>";
}

async function createUser() {
  const email = document.getElementById("email").value;
  const plan = document.getElementById("plan").value;

  const res = await fetch(
    baseURL + `/admin/create-user?email=${email}&plan=${plan}`,
    {
      method: "POST",
      headers: {
        "Authorization": "Bearer " + getKey()
      }
    }
  );

  const data = await res.json();
  document.getElementById("output").innerHTML =
    "<pre>" + JSON.stringify(data, null, 2) + "</pre>";
}
</script>

</body>
</html>
